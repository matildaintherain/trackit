<!DOCTYPE html>
<html>
<head>
    <title>Buzzer Test</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: sans-serif; text-align: center; padding: 50px 20px; background: #111; color: white; }
        button { 
            width: 100%; padding: 20px; font-size: 18px; font-weight: bold;
            border-radius: 10px; border: none; margin-bottom: 20px; cursor: pointer;
        }
        #btnReq { background: #3388ff; color: white; }
        #btnTest { background: #00cc66; color: black; }
        #status { margin-top: 20px; color: #888; font-family: monospace; }
    </style>
</head>
<body>

    <h2>Notification Debugger</h2>
    
    <button id="btnReq" onclick="askPermission()">1. GRANT PERMISSION</button>
    <button id="btnTest" onclick="showNotification()">2. TEST BUZZER</button>

    <div id="status">Status: Waiting...</div>

    <script>
        const statusDiv = document.getElementById('status');

        function askPermission() {
            if (!("Notification" in window)) {
                alert("This browser does not support desktop notification");
                return;
            }

            Notification.requestPermission().then(permission => {
                statusDiv.innerText = "Permission: " + permission;
                if (permission === "granted") {
                    alert("Permission Granted! Now try the Green Button.");
                } else {
                    alert("Permission Denied. Check Android Site Settings.");
                }
            });
        }

        function showNotification() {
            if (Notification.permission !== "granted") {
                alert("Click the Blue Button first!");
                return;
            }

            // Android specific: Use a Service Worker registration if available
            // but fallback to standard Notification
            try {
                const options = {
                    body: 'If you see this, the buzzer works!',
                    vibrate: [200, 100, 200],
                    requireInteraction: true // Keeps it on screen until you tap it
                };
                
                new Notification("SkyWatch Alert", options);
                statusDiv.innerText = "Notification Sent at " + new Date().toLocaleTimeString();
            } catch (e) {
                statusDiv.innerText = "Error: " + e.message;
            }
        }
    </script>
</body>
</html>
