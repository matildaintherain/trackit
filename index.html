<!DOCTYPE html>
<html>
<head>
    <title>Sky Radar Debug</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { font-family: sans-serif; margin: 0; background: #0b0e11; color: white; text-align: center; }
        .card { padding: 40px 20px; }
        #debug { color: #ffcc00; font-size: 12px; margin-top: 20px; padding: 10px; background: #222; border-radius: 5px; min-height: 50px; }
        #mainApp { display: none; height: 100vh; flex-direction: column; }
        #map { flex-grow: 1; width: 100%; }
        input { width: 80%; padding: 12px; margin: 10px; border-radius: 8px; border: 1px solid #444; background: #000; color: white; }
        button { padding: 15px; background: #00cc66; border: none; border-radius: 8px; font-weight: bold; width: 80%; }
    </style>
</head>
<body>

    <div id="loginScreen" class="card">
        <h1>✈️ Sky Radar</h1>
        <input type="text" id="user" placeholder="OpenSky Username">
        <input type="password" id="pass" placeholder="OpenSky Password">
        <button onclick="saveAndStart()">INITIALIZE</button>
        <div id="debug">System Status: Waiting for Login...</div>
    </div>

    <div id="mainApp">
        <div id="map"></div>
        <div style="padding: 10px; background: #1a1d21;">
            <button onclick="getLocation()" style="width: auto; padding: 10px 20px;">Manual Scan</button>
            <div id="statusUpdate" style="font-size: 10px; margin-top: 5px;"></div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        let credentials = "";
        let map;

        function log(msg) {
            document.getElementById('debug').innerText = "LOG: " + msg;
            console.log(msg);
        }

        function saveAndStart() {
            log("Button Clicked. Checking inputs...");
            const u = document.getElementById('user').value;
            const p = document.getElementById('pass').value;
            
            if(!u || !p) {
                log("Error: Username or Password empty.");
                return;
            }

            credentials = btoa(u + ":" + p);
            log("Credentials encoded. Switching screens...");

            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('mainApp').style.display = 'flex';
            
            try {
                log("Initializing Map...");
                map = L.map('map').setView([0, 0], 2);
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
                log("Map ready. Requesting GPS...");
                getLocation();
            } catch(e) {
                log("Map Error: " + e.message);
            }
        }

        function getLocation() {
            log("Requesting Location Access...");
            if (!navigator.geolocation) {
                log("Error: Geolocation not supported by browser.");
                return;
            }

            navigator.geolocation.getCurrentPosition(
                (pos) => {
                    log("GPS Success! Fetching OpenSky Data...");
                    fetchData(pos.coords.latitude, pos.coords.longitude);
                },
                (err) => {
                    log("GPS Denied: " + err.message + " (Check Chrome Settings)");
                },
                { timeout: 10000 }
            );
        }

        async function fetchData(lat, lon) {
            const url = `https://opensky-network.org/api/states/all?lamin=${lat-0.1}&lomin=${lon-0.1}&lamax=${lat+0.1}&lomax=${lon+0.1}`;
            
            try {
                const response = await fetch(url, {
                    headers: { 'Authorization': 'Basic ' + credentials }
                });
                
                if (response.status === 401) {
                    log("Error 401: Invalid OpenSky Login.");
                    return;
                }

                const data = await response.json();
                log("Success! Found " + (data.states ? data.states.length : 0) + " planes.");
                document.getElementById('statusUpdate').innerText = "Last Update: " + new Date().toLocaleTimeString();
            } catch (e) {
                log("API Error: " + e.message);
            }
        }
    </script>
</body>
</html>
